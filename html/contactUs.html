<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="../css/contactUs.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main__wrapper">
          <header>
        <div>
          <figure class="logo">
            <img src="../images/Logo.svg" alt="logo" />
          </figure>

          <nav class="nav">
            <input type="checkbox" id="navCheck" class="nav__check" />

            <label for="navCheck" class="nav__toggle">☰</label>

            <div class="nav__links">
              <a href="#">Home</a>

              <div class="nav__item dropdown">
                <a href="#">Pages</a>
                <ul class="dropdown__menu">
                  <li><a href="#">Our Projects</a></li>
                  <li><a href="#">Professionals</a></li>
                  <li><a href="#">Services Single</a></li>
                  <li><a href="#">Pricing Plan</a></li>
                  <li><a href="#">Blog</a></li>
                  <li><a href="#">FAQ</a></li>
                </ul>
              </div>

              <a href="#">Services</a>
              <a href="#">Project</a>
              <a href="#">Blog</a>
              <a href="#">Contact</a>
            </div>

            <figure class="searchIcon">
              <img src="../images/Search Icon.svg" alt="search" />
            </figure>
          </nav>
        </div>
      </header>
    </div>
    <main>
      <section class="contactUs__section">
        <div class="contactUs__section__title">
          <h1>Contact Us</h1>
          <p>Home / Contact</p>
        </div>
      </section>

      <section>
        <div class="form__section">
          <h1>We love meeting new people <br />and helping them</h1>
          <div class="form__content">
            <div class="contact__info">
              <p>info@yourdomain.com</p>
              <p>+1 (378) 400-1234</p>
              <p>www.yourdomain.com</p>
            </div>
            <form>
              <label for="Name">Name</label>
              <input type="text" id="Name" />

              <label for="Email">Email</label>
              <input type="text" id="Email" />

              <label for="Subject">Subject</label>
              <input type="text" id="Subject" />

              <label for="Phone">Phone</label>
              <input type="text" id="Phone" />
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
